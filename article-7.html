<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected — Christine Han</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+KR:wght@200;300;400;500;600&family=Karla:wght@300;400;500&display=swap');

  :root {
    --hanji: #F3EBE0;
    --hanji-warm: #EBE0D2;
    --ink: #2C251D;
    --ink-soft: #52493B;
    --persimmon: #C07A6E;
    --amber: #C4A86C;
    --celadon: #9AAD8C;
    --sienna: #8E7766;
    --mauve: #A08890;
    --warm-gray: #847A6C;
    --wood: #6E5C3A;
    --wood-med: #8A7650;
    --wood-light: #AA9868;
    --taupe: #B0A090;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow-x: hidden; }
  body {
    font-family: 'Karla', sans-serif;
    color: var(--ink);
    background: var(--hanji);
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    pointer-events: none; z-index: 0; opacity: 0.07;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='h'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.5' numOctaves='5' seed='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23h)'/%3E%3C/svg%3E");
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 18% 22%, rgba(212,184,176,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 78% 60%, rgba(180,200,170,0.06) 0%, transparent 45%);
  }

  nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 2rem 5vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 200;
    background: rgba(243, 235, 224, 0.94);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border-bottom: 1px solid rgba(200, 188, 168, 0.25);
  }
  .logo { font-family: 'Noto Serif KR', serif; font-weight: 400; font-size: 1rem; }
  .logo-en { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 0.85rem; color: var(--ink-soft); margin-left: 0.8rem; letter-spacing: 0.06em; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--ink-soft); font-size: .76rem; letter-spacing: .14em; text-transform: lowercase; position: relative; }
  .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: var(--persimmon); transition: width .5s cubic-bezier(.25,.1,.25,1); }
  .nav-links a:hover::after { width: 100%; }

  .back-link {
    display: inline-block;
    font-size: .8rem;
    letter-spacing: .1em;
    color: var(--ink-soft);
    text-decoration: none;
    transition: color .3s;
    margin-bottom: 2rem;
  }
  .back-link:hover { color: var(--persimmon); }

  .article-page { position: relative; z-index: 1; }
  .article-body {
    max-width: 680px; margin: 0 auto;
    padding: 8rem 2rem 6rem;
  }
  .article-body .article-tag {
    font-size: .7rem; letter-spacing: .12em;
    text-transform: uppercase; color: var(--celadon);
    margin-bottom: 1rem;
  }
  .article-body h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 400; font-size: 2.4rem;
    line-height: 1.3; margin-bottom: 0.6rem;
  }
  .article-body .article-date {
    font-size: .75rem; color: var(--taupe);
    letter-spacing: .08em; margin-bottom: 3rem;
  }
  .article-body .article-content {
    font-size: .95rem; line-height: 2;
    color: var(--ink-soft);
  }
  .article-body .article-content p { margin-bottom: 1.5rem; }

  /* Password gate */
  .pw-gate {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem; text-align: center;
  }
  .pw-gate .pw-icon { font-size: 2.4rem; margin-bottom: 1.5rem; opacity: 0.5; }
  .pw-gate h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 400; font-size: 1.6rem;
    color: var(--ink); margin-bottom: 0.5rem;
  }
  .pw-gate p {
    font-size: .85rem; color: var(--ink-soft);
    margin-bottom: 2rem; letter-spacing: .03em;
  }
  .pw-gate .pw-form { display: flex; gap: 0.75rem; align-items: center; }
  .pw-gate input[type="password"] {
    font-family: 'Karla', sans-serif; font-size: .85rem;
    padding: 0.65rem 1.2rem;
    border: 1px solid var(--hanji-warm); border-radius: 4px;
    background: rgba(255,255,255,0.5); color: var(--ink);
    outline: none; transition: border-color .3s;
    letter-spacing: .06em; width: 220px;
  }
  .pw-gate input[type="password"]:focus { border-color: var(--persimmon); }
  .pw-gate button {
    font-family: 'Karla', sans-serif; font-size: .75rem;
    letter-spacing: .1em; text-transform: lowercase;
    padding: 0.7rem 1.6rem;
    border: 1px solid var(--ink-soft); border-radius: 4px;
    background: none; color: var(--ink-soft);
    cursor: pointer; transition: all .3s;
  }
  .pw-gate button:hover {
    background: var(--ink); color: var(--hanji); border-color: var(--ink);
  }
  .pw-error {
    color: var(--persimmon); font-size: .75rem;
    letter-spacing: .06em; margin-top: 1rem;
    opacity: 0; transition: opacity .3s;
  }
  .pw-error.visible { opacity: 1; }
</style>
</head>

  function b64ToArr(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }

  async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
  }

  async function checkPw() {
    const password = document.getElementById('pw-input').value;
    try {
      const salt = b64ToArr(ENCRYPTED.salt);
      const iv = b64ToArr(ENCRYPTED.iv);
      const ct = b64ToArr(ENCRYPTED.ct);
      const key = await deriveKey(password, salt);
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      const html = new TextDecoder().decode(plain);

      document.getElementById('pw-gate').style.display = 'none';
      document.getElementById('article-body').innerHTML = html;
      document.getElementById('article-page').style.display = '';
      document.title = '2025 Wrapped — Christine Han';
    } catch (e) {
      document.getElementById('pw-error').classList.add('visible');
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPw();
  });
</script>
